server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name:app}

spring:
  application:
    name: inventory

  rabbitmq:
    host: localhost
    port: 5672
    username: rabbitmq
    password: rabbitmq

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
